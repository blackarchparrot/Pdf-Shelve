<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suggest a PDF | PDF Shelve</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:700px;
background:#1e293b;
padding:35px;
border-radius:15px;
box-shadow:0 0 25px rgba(0,0,0,.4);
}

h1{
text-align:center;
margin-bottom:10px;
}

p{
text-align:center;
color:#cbd5e1;
margin-bottom:30px;
}

label{
display:block;
margin-top:18px;
margin-bottom:8px;
font-weight:bold;
}

input,select,textarea{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:#334155;
color:white;
font-size:16px;
}

input:focus,
textarea:focus,
select:focus{
outline:2px solid #3b82f6;
}

textarea{
resize:vertical;
min-height:120px;
}

button{
margin-top:25px;
width:100%;
padding:15px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#2563eb;
}

.note{
margin-top:25px;
padding:15px;
background:#0f172a;
border-left:5px solid #3b82f6;
border-radius:8px;
font-size:14px;
color:#cbd5e1;
}

footer{
text-align:center;
margin-top:25px;
color:#94a3b8;
font-size:14px;
}

a{
color:#60a5fa;
text-decoration:none;
}
</style>

</head>

<body>

<div class="container">

<h1>📚 Suggest a PDF</h1>

<p>
Can't find the PDF you're looking for?
Submit your request and we'll try to add it.
</p>

<form action="https://formsubmit.co/YOUR_EMAIL@gmail.com" method="POST">

<input type="hidden" name="_subject" value="New PDF Suggestion">

<label>Your Name</label>
<input
type="text"
name="Name"
placeholder="Enter your name"
required>

<label>Email (Optional)</label>
<input
type="email"
name="Email"
placeholder="example@email.com">

<label>Category</label>

<select name="Category">

<option>Engineering</option>
<option>Computer Science</option>
<option>Physics</option>
<option>Mathematics</option>
<option>Chemistry</option>
<option>Admission</option>
<option>Notes</option>
<option>Others</option>

</select>

<label>Book / PDF Name</label>

<input
type="text"
name="PDF Name"
placeholder="Example: Engineering Mechanics"
required>

<label>Author (Optional)</label>

<input
type="text"
name="Author"
placeholder="Author Name">

<label>Additional Details</label>

<textarea
name="Details"
placeholder="Edition, publisher, university, drive link, etc."></textarea>

<button type="submit">
📤 Submit Suggestion
</button>

</form>

<div class="note">

<strong>Note:</strong>

Please provide accurate information.
We review every suggestion before adding new PDFs to the library.

</div>

<footer>

<a href="index.html">⬅ Back to Home</a>

</footer>

</div>

</body>
</html>
